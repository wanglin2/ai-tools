<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
  <title>JSON 格式化工具 · 思绪工具箱</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f8fafc;
      font-family: 'Segoe UI', system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      background: radial-gradient(circle at 30% 20%, rgba(226, 232, 240, 0.35) 0%, transparent 45%),
                  linear-gradient(180deg, #ffffff 0%, #f1f5f9 100%);
    }

    .container {
      max-width: 1300px;
      width: 100%;
      background: #ffffff;
      border-radius: 2.2rem;
      box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.12), 0 8px 20px rgba(0, 20, 40, 0.05);
      padding: 2rem 2rem 2.2rem;
      border: 1px solid rgba(203, 213, 225, 0.5);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .title-section {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .title-icon {
      font-size: 2.2rem;
      background: #fef9c3;
      border-radius: 1rem;
      padding: 0.3rem;
    }

    h1 {
      font-size: 1.9rem;
      font-weight: 650;
      color: #0f172a;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .badge-group {
      display: flex;
      gap: 0.6rem;
      align-items: center;
    }

    .badge {
      background: #f1f5f9;
      color: #334155;
      padding: 0.3rem 1rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .ai-badge {
      background: #ede9fe;
      color: #6b21a8;
      font-weight: 600;
    }

    .back-link {
      font-size: 0.85rem;
      color: #3b82f6;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .editor-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-top: 0.3rem;
    }

    @media (max-width: 800px) {
      .editor-panel {
        grid-template-columns: 1fr;
      }
    }

    .text-block {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .label {
      font-weight: 600;
      color: #1e293b;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .text-actions {
      display: flex;
      gap: 0.4rem;
    }

    .icon-btn {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 0.7rem;
      padding: 0.3rem 0.7rem;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.2s;
      color: #334155;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }

    .icon-btn:hover {
      background: #e2e8f0;
      border-color: #cbd5e1;
    }

    textarea {
      width: 100%;
      height: 320px;
      padding: 1rem;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 0.9rem;
      line-height: 1.6;
      border: 1.5px solid #e2e8f0;
      border-radius: 1.2rem;
      resize: vertical;
      background: #f9fafb;
      transition: 0.2s;
      color: #0f172a;
      outline: none;
    }

    textarea:focus {
      border-color: #f59e0b;
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1);
      background: #ffffff;
    }

    .output-area {
      background: #1e293b;
      border-radius: 1.2rem;
      padding: 1rem;
      height: 320px;
      overflow-y: auto;
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 0.9rem;
      line-height: 1.7;
      color: #e2e8f0;
      white-space: pre-wrap;
      word-break: break-all;
      border: 1.5px solid #334155;
      position: relative;
    }

    .output-placeholder {
      color: #64748b;
      font-style: italic;
    }

    .json-key {
      color: #93c5fd;
    }
    .json-string {
      color: #86efac;
    }
    .json-number {
      color: #fde68a;
    }
    .json-boolean {
      color: #c084fc;
    }
    .json-null {
      color: #f87171;
    }

    .action-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin: 0.5rem 0 0.8rem;
    }

    .btn {
      border: none;
      padding: 0.8rem 1.8rem;
      border-radius: 2.5rem;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: white;
      border: 1px solid #cbd5e1;
      color: #1e293b;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }

    .btn-primary {
      background: #0f172a;
      color: white;
      border: 1px solid #0f172a;
      box-shadow: 0 10px 18px -8px rgba(15,23,42,0.3);
    }

    .btn-primary:hover {
      background: #1e293b;
    }

    .btn-warning {
      background: #f59e0b;
      color: #0f172a;
      border: 1px solid #f59e0b;
      font-weight: 650;
    }

    .btn-warning:hover {
      background: #d97706;
      border-color: #d97706;
    }

    .btn-outline:hover {
      background: #f1f5f9;
      border-color: #94a3b8;
    }

    .error-message {
      color: #f87171;
      background: #7f1d1d;
      padding: 0.6rem 1rem;
      border-radius: 1rem;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      display: none;
      font-weight: 500;
    }

    .success-message {
      color: #4ade80;
      font-size: 0.8rem;
      margin-top: 0.3rem;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #64748b;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title-section">
        <span class="title-icon">📦</span>
        <h1>JSON 格式化工具</h1>
      </div>
      <div class="badge-group">
        <span class="badge ai-badge">✨ AI 生成</span>
        <span class="badge">格式化 · 压缩 · 验证</span>
        <a href="index.html" class="back-link">← 工具箱首页</a>
      </div>
    </div>

    <div class="editor-panel">
      <div class="text-block">
        <div class="label-row">
          <span class="label"><span>📥</span> 输入 JSON</span>
          <div class="text-actions">
            <button class="icon-btn" id="clearInputBtn" title="清空">🗑️</button>
            <button class="icon-btn" id="pasteInputBtn" title="粘贴">📋</button>
            <button class="icon-btn" id="sampleBtn" title="加载示例">✨</button>
          </div>
        </div>
        <textarea id="inputTextarea" placeholder='粘贴或输入 JSON 数据，例如：{"name":"思绪","version":1.0}'></textarea>
        <div class="error-message" id="errorMessage"></div>
      </div>
      <div class="text-block">
        <div class="label-row">
          <span class="label"><span>📤</span> 格式化结果</span>
          <div class="text-actions">
            <button class="icon-btn" id="copyOutputBtn" title="复制结果">📋</button>
            <button class="icon-btn" id="downloadOutputBtn" title="下载 JSON">💾</button>
          </div>
        </div>
        <div class="output-area" id="outputArea">
          <span class="output-placeholder">格式化后的 JSON 将显示在这里</span>
        </div>
        <div class="info-row" id="outputInfo" style="display: none;">
          <span id="charCount">字符数：0</span>
          <span id="lineCount">行数：0</span>
        </div>
      </div>
    </div>

    <div class="action-bar">
      <button class="btn btn-primary" id="formatBtn">🎨 格式化</button>
      <button class="btn btn-outline" id="compressBtn">🗜️ 压缩</button>
      <button class="btn btn-outline" id="validateBtn">✅ 验证</button>
      <button class="btn btn-outline" id="escapeBtn">🔣 转义</button>
      <button class="btn btn-outline" id="unescapeBtn">🔓 反转义</button>
    </div>
  </div>

  <script>
    (function() {
      // DOM 元素
      const inputTextarea = document.getElementById('inputTextarea');
      const outputArea = document.getElementById('outputArea');
      const errorMessage = document.getElementById('errorMessage');
      const outputInfo = document.getElementById('outputInfo');
      const charCountSpan = document.getElementById('charCount');
      const lineCountSpan = document.getElementById('lineCount');
      
      const formatBtn = document.getElementById('formatBtn');
      const compressBtn = document.getElementById('compressBtn');
      const validateBtn = document.getElementById('validateBtn');
      const escapeBtn = document.getElementById('escapeBtn');
      const unescapeBtn = document.getElementById('unescapeBtn');
      const clearInputBtn = document.getElementById('clearInputBtn');
      const pasteInputBtn = document.getElementById('pasteInputBtn');
      const sampleBtn = document.getElementById('sampleBtn');
      const copyOutputBtn = document.getElementById('copyOutputBtn');
      const downloadOutputBtn = document.getElementById('downloadOutputBtn');

      // 当前格式化后的JSON对象（用于下载等）
      let currentFormattedJson = null;

      // ---------- 工具函数 ----------
      function hideError() {
        errorMessage.style.display = 'none';
        errorMessage.textContent = '';
      }

      function showError(msg) {
        errorMessage.textContent = '❌ ' + (msg || '未知错误');
        errorMessage.style.display = 'block';
      }

      function updateOutputInfo(text) {
        if (text && text.trim().length > 0) {
          const lines = text.split('\n');
          charCountSpan.textContent = `字符数：${text.length}`;
          lineCountSpan.textContent = `行数：${lines.length}`;
          outputInfo.style.display = 'flex';
        } else {
          outputInfo.style.display = 'none';
        }
      }

      // 语法高亮JSON（简单版）
      function syntaxHighlight(json) {
        if (typeof json !== 'string') {
          json = JSON.stringify(json, null, 2);
        }
        json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        return json.replace(
          /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
          function (match) {
            let cls = 'json-number';
            if (/^"/.test(match)) {
              if (/:$/.test(match)) {
                cls = 'json-key';
                // 去掉冒号再处理
                return '<span class="' + cls + '">' + match.slice(0, -1) + '</span>:';
              } else {
                cls = 'json-string';
              }
            } else if (/true|false/.test(match)) {
              cls = 'json-boolean';
            } else if (/null/.test(match)) {
              cls = 'json-null';
            }
            return '<span class="' + cls + '">' + match + '</span>';
          }
        );
      }

      // 显示格式化结果
      function displayOutput(jsonString, isError = false) {
        if (isError) {
          outputArea.innerHTML = `<span style="color:#f87171;">${escapeHtml(jsonString)}</span>`;
          currentFormattedJson = null;
          updateOutputInfo('');
          return;
        }
        
        const highlighted = syntaxHighlight(jsonString);
        outputArea.innerHTML = highlighted;
        currentFormattedJson = jsonString;
        updateOutputInfo(jsonString);
        hideError();
      }

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      // 核心：格式化JSON
      function formatJson(input) {
        try {
          const parsed = JSON.parse(input);
          const formatted = JSON.stringify(parsed, null, 2);
          displayOutput(formatted);
          hideError();
          return formatted;
        } catch (e) {
          showError('JSON 解析错误：' + e.message);
          outputArea.innerHTML = '<span class="output-placeholder">格式化失败，请检查输入</span>';
          currentFormattedJson = null;
          updateOutputInfo('');
          return null;
        }
      }

      // 压缩JSON
      function compressJson(input) {
        try {
          const parsed = JSON.parse(input);
          const compressed = JSON.stringify(parsed);
          displayOutput(compressed);
          hideError();
          return compressed;
        } catch (e) {
          showError('JSON 解析错误：' + e.message);
          outputArea.innerHTML = '<span class="output-placeholder">压缩失败</span>';
          currentFormattedJson = null;
          updateOutputInfo('');
          return null;
        }
      }

      // 验证JSON
      function validateJson(input) {
        try {
          const parsed = JSON.parse(input);
          const formatted = JSON.stringify(parsed, null, 2);
          displayOutput(formatted);
          hideError();
          // 额外显示成功提示
          const successDiv = document.createElement('div');
          successDiv.className = 'success-message';
          successDiv.textContent = '✅ JSON 格式有效';
          outputArea.appendChild(successDiv);
          return true;
        } catch (e) {
          showError('JSON 无效：' + e.message);
          outputArea.innerHTML = '<span class="output-placeholder">验证失败</span>';
          currentFormattedJson = null;
          updateOutputInfo('');
          return false;
        }
      }

      // 转义JSON字符串（将JSON转为转义后的字符串）
      function escapeJsonString(input) {
        try {
          // 先尝试解析，如果是有效JSON则转义整个字符串
          JSON.parse(input); // 验证
          const escaped = JSON.stringify(input);
          displayOutput(escaped);
          hideError();
          return escaped;
        } catch (e) {
          // 如果输入不是有效JSON，直接对原始文本进行转义
          const escaped = JSON.stringify(input);
          displayOutput(escaped);
          hideError();
          return escaped;
        }
      }

      // 反转义
      function unescapeJsonString(input) {
        try {
          const unescaped = JSON.parse(input);
          if (typeof unescaped === 'string') {
            // 如果反转义后仍是字符串，尝试再次解析为JSON对象
            try {
              const parsedJson = JSON.parse(unescaped);
              displayOutput(JSON.stringify(parsedJson, null, 2));
            } catch {
              displayOutput(unescaped);
            }
          } else {
            displayOutput(JSON.stringify(unescaped, null, 2));
          }
          hideError();
        } catch (e) {
          showError('反转义失败：' + e.message);
          outputArea.innerHTML = '<span class="output-placeholder">反转义失败</span>';
          currentFormattedJson = null;
          updateOutputInfo('');
        }
      }

      // 复制到剪贴板
      async function copyToClipboard(text) {
        try {
          await navigator.clipboard.writeText(text);
          alert('✅ 已复制到剪贴板');
        } catch (err) {
          alert('❌ 复制失败，请手动复制');
        }
      }

      // 下载JSON文件
      function downloadJson(jsonString) {
        if (!jsonString) {
          alert('没有可下载的内容');
          return;
        }
        const blob = new Blob([jsonString], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `formatted_${Date.now()}.json`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      }

      // 加载示例
      function loadSample() {
        const sample = {
          "name": "思绪思维导图",
          "version": "1.0.0",
          "description": "一个简洁的思维导图工具",
          "author": {
            "name": "街角小林",
            "email": "dev@example.com"
          },
          "features": ["思维导图", "Markdown", "导出"],
          "settings": {
            "theme": "light",
            "autoSave": true,
            "interval": 300
          },
          "metadata": null
        };
        inputTextarea.value = JSON.stringify(sample, null, 2);
        // 自动格式化
        formatJson(inputTextarea.value);
      }

      // ---------- 事件绑定 ----------
      formatBtn.addEventListener('click', () => {
        const input = inputTextarea.value.trim();
        if (!input) {
          showError('请输入 JSON 数据');
          return;
        }
        formatJson(input);
      });

      compressBtn.addEventListener('click', () => {
        const input = inputTextarea.value.trim();
        if (!input) {
          showError('请输入 JSON 数据');
          return;
        }
        compressJson(input);
      });

      validateBtn.addEventListener('click', () => {
        const input = inputTextarea.value.trim();
        if (!input) {
          showError('请输入 JSON 数据');
          return;
        }
        validateJson(input);
      });

      escapeBtn.addEventListener('click', () => {
        const input = inputTextarea.value.trim();
        if (!input) {
          showError('请输入内容');
          return;
        }
        escapeJsonString(input);
      });

      unescapeBtn.addEventListener('click', () => {
        const input = inputTextarea.value.trim();
        if (!input) {
          showError('请输入转义后的内容');
          return;
        }
        unescapeJsonString(input);
      });

      clearInputBtn.addEventListener('click', () => {
        inputTextarea.value = '';
        outputArea.innerHTML = '<span class="output-placeholder">格式化后的 JSON 将显示在这里</span>';
        hideError();
        currentFormattedJson = null;
        updateOutputInfo('');
      });

      pasteInputBtn.addEventListener('click', async () => {
        try {
          const text = await navigator.clipboard.readText();
          if (text) {
            inputTextarea.value = text;
          }
        } catch (err) {
          alert('无法读取剪贴板，请手动粘贴 (Ctrl+V)');
        }
      });

      sampleBtn.addEventListener('click', loadSample);

      copyOutputBtn.addEventListener('click', () => {
        if (currentFormattedJson) {
          copyToClipboard(currentFormattedJson);
        } else {
          const outputText = outputArea.innerText || outputArea.textContent;
          if (outputText && outputText.trim() && !outputText.includes('将显示在这里')) {
            copyToClipboard(outputText);
          } else {
            alert('没有可复制的内容');
          }
        }
      });

      downloadOutputBtn.addEventListener('click', () => {
        if (currentFormattedJson) {
          downloadJson(currentFormattedJson);
        } else {
          const outputText = outputArea.innerText || outputArea.textContent;
          if (outputText && outputText.trim() && !outputText.includes('将显示在这里')) {
            downloadJson(outputText);
          } else {
            alert('没有可下载的内容');
          }
        }
      });

      // 快捷键：Ctrl+Enter 格式化
      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          e.preventDefault();
          const input = inputTextarea.value.trim();
          if (input) {
            formatJson(input);
          }
        }
      });

      // 初始化
      hideError();
      outputInfo.style.display = 'none';
      console.log('JSON 格式化工具已启动，Ctrl+Enter 快速格式化');
    })();
  </script>
</body>
</html>
