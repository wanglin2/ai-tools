<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
  <title>全屏时钟 · 思绪工具箱</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0f;
      font-family: 'Segoe UI', system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: none;
      user-select: none;
      -webkit-user-select: none;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 70%);
      position: relative;
    }

    /* 粒子背景 */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 50%;
      animation: float linear infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }
      10% {
        opacity: 0.6;
      }
      90% {
        opacity: 0.6;
      }
      100% {
        transform: translateY(-100vh) scale(1.5);
        opacity: 0;
      }
    }

    /* 主时钟容器 */
    .clock-container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      animation: fadeIn 1.5s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* 时间显示 */
    .time-display {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      text-shadow: 0 0 80px rgba(100, 180, 255, 0.3), 0 0 160px rgba(100, 180, 255, 0.15);
    }

    .time-part {
      font-size: clamp(5rem, 15vw, 12rem);
      font-weight: 200;
      color: #e0e8ff;
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      transition: color 0.5s ease;
    }

    .time-separator {
      font-size: clamp(4rem, 12vw, 10rem);
      font-weight: 100;
      color: #6b8cbf;
      animation: blink 1s step-end infinite;
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    }

    @keyframes blink {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.2;
      }
    }

    /* 日期显示 */
    .date-display {
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-weight: 300;
      color: #8899bb;
      letter-spacing: 0.15em;
      text-shadow: 0 0 30px rgba(100, 150, 220, 0.2);
      display: flex;
      gap: 0.8rem;
      align-items: center;
    }

    .date-display span {
      opacity: 0.85;
    }

    .weekday {
      color: #a0c4ff;
      font-weight: 400;
    }

    /* 底部提示 */
    .hint {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      color: #3a4a6a;
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.8s ease;
      cursor: default;
    }

    body:hover .hint {
      opacity: 0.7;
    }

    body:hover {
      cursor: default;
    }

    /* 移动端触摸显示提示 */
    @media (hover: none) {
      .hint {
        opacity: 0.5;
      }
    }

    /* 光晕效果 */
    .glow-ring {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: clamp(300px, 60vw, 700px);
      height: clamp(300px, 60vw, 700px);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(60, 100, 200, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 5;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.6;
      }
      50% {
        transform: translate(-50%, -50%) scale(1.08);
        opacity: 0.9;
      }
    }
  </style>
</head>
<body>
  <!-- 粒子背景 -->
  <div class="particles" id="particlesContainer"></div>

  <!-- 光晕 -->
  <div class="glow-ring"></div>

  <!-- 时钟主体 -->
  <div class="clock-container">
    <div class="time-display" id="timeDisplay">
      <span class="time-part" id="hours">00</span>
      <span class="time-separator">:</span>
      <span class="time-part" id="minutes">00</span>
      <span class="time-separator">:</span>
      <span class="time-part" id="seconds">00</span>
    </div>
    <div class="date-display" id="dateDisplay">
      <span id="year">2026</span>
      <span>·</span>
      <span id="monthDay">05/19</span>
      <span>·</span>
      <span class="weekday" id="weekday">周二</span>
    </div>
  </div>

  <!-- 底部提示 -->
  <div class="hint">按 ESC 或双击退出全屏 · 思绪时钟</div>

  <script>
    (function() {
      // 粒子生成
      function createParticles() {
        const container = document.getElementById('particlesContainer');
        const particleCount = 50;
        
        for (let i = 0; i < particleCount; i++) {
          const particle = document.createElement('div');
          particle.className = 'particle';
          
          const size = Math.random() * 3 + 1;
          const left = Math.random() * 100;
          const duration = Math.random() * 15 + 10;
          const delay = Math.random() * 15;
          
          particle.style.width = size + 'px';
          particle.style.height = size + 'px';
          particle.style.left = left + '%';
          particle.style.animationDuration = duration + 's';
          particle.style.animationDelay = delay + 's';
          
          container.appendChild(particle);
        }
      }

      // 时间更新
      function updateClock() {
        const now = new Date();
        
        // 时间
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        
        document.getElementById('hours').textContent = hours;
        document.getElementById('minutes').textContent = minutes;
        document.getElementById('seconds').textContent = seconds;
        
        // 日期
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        
        document.getElementById('year').textContent = year;
        document.getElementById('monthDay').textContent = `${month}/${day}`;
        
        // 星期
        const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        document.getElementById('weekday').textContent = weekdays[now.getDay()];
        
        // 根据时间微调颜色（夜晚更暖）
        const hour = now.getHours();
        const timeDisplay = document.getElementById('timeDisplay');
        if (hour >= 6 && hour < 18) {
          timeDisplay.style.filter = 'none';
        } else {
          timeDisplay.style.filter = 'hue-rotate(-10deg) saturate(0.9)';
        }
      }

      // 全屏切换
      function toggleFullscreen() {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
          // 进入全屏
          const docEl = document.documentElement;
          if (docEl.requestFullscreen) {
            docEl.requestFullscreen();
          } else if (docEl.webkitRequestFullscreen) {
            docEl.webkitRequestFullscreen();
          }
        } else {
          // 退出全屏
          if (document.exitFullscreen) {
            document.exitFullscreen();
          } else if (document.webkitExitFullscreen) {
            document.webkitExitFullscreen();
          }
        }
      }

      // 事件监听
      function setupEvents() {
        // 双击切换全屏
        document.addEventListener('dblclick', (e) => {
          e.preventDefault();
          toggleFullscreen();
        });

        // ESC 退出全屏（浏览器默认行为，但我们可以确保）
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && document.fullscreenElement) {
            // 浏览器会自动处理，无需额外操作
          }
          // 按 F 键也可以切换全屏
          if (e.key === 'f' || e.key === 'F') {
            e.preventDefault();
            toggleFullscreen();
          }
        });

        // 移动端触摸
        document.addEventListener('touchstart', (e) => {
          if (e.touches.length === 2) {
            // 双指触摸切换全屏
            toggleFullscreen();
          }
        });

        // 自动尝试进入全屏（需要用户交互，所以首次点击时触发）
        let autoFullscreenAttempted = false;
        document.addEventListener('click', () => {
          if (!autoFullscreenAttempted && !document.fullscreenElement && !document.webkitFullscreenElement) {
            autoFullscreenAttempted = true;
            // 不自动全屏，让用户决定，但可以显示更明显的提示
            const hint = document.querySelector('.hint');
            if (hint) {
              hint.style.opacity = '0.8';
              setTimeout(() => {
                hint.style.opacity = '0';
              }, 4000);
            }
          }
        });
      }

      // 初始化
      function init() {
        createParticles();
        updateClock();
        setupEvents();
        
        // 每秒更新时钟
        setInterval(updateClock, 1000);
        
        // 页面加载后短暂显示提示
        setTimeout(() => {
          const hint = document.querySelector('.hint');
          if (hint) {
            hint.style.opacity = '0.6';
            setTimeout(() => {
              hint.style.opacity = '0';
            }, 5000);
          }
        }, 1000);
      }

      // 启动
      document.addEventListener('DOMContentLoaded', init);
    })();
  </script>
</body>
</html>
