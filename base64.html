<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
  <title>Base64 编解码工具 · 思绪工具箱</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f8fafc;
      font-family: 'Segoe UI', system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      background: radial-gradient(circle at 25% 30%, rgba(226, 232, 240, 0.3) 0%, transparent 45%),
                  linear-gradient(180deg, #ffffff 0%, #f1f5f9 100%);
    }

    .container {
      max-width: 1200px;
      width: 100%;
      background: #ffffff;
      border-radius: 2.2rem;
      box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.12), 0 8px 20px rgba(0, 20, 40, 0.05);
      padding: 2rem 2rem 2.2rem;
      border: 1px solid rgba(203, 213, 225, 0.5);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .title-section {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .title-icon {
      font-size: 2.2rem;
      background: #e0f2fe;
      border-radius: 1rem;
      padding: 0.3rem;
    }

    h1 {
      font-size: 1.9rem;
      font-weight: 650;
      color: #0f172a;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .badge-group {
      display: flex;
      gap: 0.6rem;
      align-items: center;
    }

    .badge {
      background: #f1f5f9;
      color: #334155;
      padding: 0.3rem 1rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .ai-badge {
      background: #ede9fe;
      color: #6b21a8;
      font-weight: 600;
    }

    .back-link {
      font-size: 0.85rem;
      color: #3b82f6;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .editor-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-top: 0.3rem;
    }

    @media (max-width: 750px) {
      .editor-panel {
        grid-template-columns: 1fr;
      }
    }

    .text-block {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .label {
      font-weight: 600;
      color: #1e293b;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .text-actions {
      display: flex;
      gap: 0.4rem;
    }

    .icon-btn {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 0.7rem;
      padding: 0.3rem 0.7rem;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.2s;
      color: #334155;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }

    .icon-btn:hover {
      background: #e2e8f0;
      border-color: #cbd5e1;
    }

    textarea {
      width: 100%;
      height: 280px;
      padding: 1rem;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 0.9rem;
      line-height: 1.6;
      border: 1.5px solid #e2e8f0;
      border-radius: 1.2rem;
      resize: vertical;
      background: #f9fafb;
      transition: 0.2s;
      color: #0f172a;
      outline: none;
    }

    textarea:focus {
      border-color: #06b6d4;
      box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.08);
      background: #ffffff;
    }

    .action-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin: 0.5rem 0 0.8rem;
    }

    .btn {
      border: none;
      padding: 0.8rem 1.8rem;
      border-radius: 2.5rem;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: white;
      border: 1px solid #cbd5e1;
      color: #1e293b;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }

    .btn-primary {
      background: #0f172a;
      color: white;
      border: 1px solid #0f172a;
      box-shadow: 0 10px 18px -8px rgba(15,23,42,0.3);
    }

    .btn-primary:hover {
      background: #1e293b;
    }

    .btn-accent {
      background: #06b6d4;
      color: #0f172a;
      border: 1px solid #06b6d4;
      font-weight: 650;
    }

    .btn-accent:hover {
      background: #0891b2;
      border-color: #0891b2;
    }

    .btn-outline:hover {
      background: #f1f5f9;
      border-color: #94a3b8;
    }

    .error-message {
      color: #dc2626;
      font-size: 0.85rem;
      margin-top: 0.4rem;
      font-weight: 500;
      display: none;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #64748b;
      font-size: 0.8rem;
      margin-top: 0.3rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title-section">
        <span class="title-icon">🔐</span>
        <h1>Base64 编解码</h1>
      </div>
      <div class="badge-group">
        <span class="badge ai-badge">✨ AI 生成</span>
        <span class="badge">编码 · 解码</span>
        <a href="index.html" class="back-link">← 工具箱首页</a>
      </div>
    </div>

    <div class="editor-panel">
      <div class="text-block">
        <div class="label-row">
          <span class="label"><span>📝</span> 原始文本</span>
          <div class="text-actions">
            <button class="icon-btn" id="clearInputBtn" title="清空">🗑️</button>
            <button class="icon-btn" id="pasteInputBtn" title="粘贴">📋</button>
          </div>
        </div>
        <textarea id="inputTextarea" placeholder="在此输入要编码的文本..."></textarea>
        <div class="error-message" id="inputError"></div>
      </div>
      <div class="text-block">
        <div class="label-row">
          <span class="label"><span>🔒</span> Base64 结果</span>
          <div class="text-actions">
            <button class="icon-btn" id="copyOutputBtn" title="复制结果">📋</button>
            <button class="icon-btn" id="swapBtn" title="交换内容">🔄</button>
          </div>
        </div>
        <textarea id="outputTextarea" placeholder="Base64 编码结果将显示在这里..."></textarea>
        <div class="error-message" id="outputError"></div>
      </div>
    </div>

    <div class="action-bar">
      <button class="btn btn-primary" id="encodeBtn">🔒 编码 (Encode)</button>
      <button class="btn btn-accent" id="decodeBtn">🔓 解码 (Decode)</button>
      <button class="btn btn-outline" id="clearAllBtn">🗑️ 全部清空</button>
    </div>

    <div class="info-row">
      <span>💡 提示：编码将文本转为 Base64，解码将 Base64 还原为文本</span>
      <span id="charCount">字符数：0</span>
    </div>
  </div>

  <script>
    (function() {
      // DOM 元素
      const inputTextarea = document.getElementById('inputTextarea');
      const outputTextarea = document.getElementById('outputTextarea');
      const inputError = document.getElementById('inputError');
      const outputError = document.getElementById('outputError');
      const charCountSpan = document.getElementById('charCount');
      
      const encodeBtn = document.getElementById('encodeBtn');
      const decodeBtn = document.getElementById('decodeBtn');
      const clearAllBtn = document.getElementById('clearAllBtn');
      const clearInputBtn = document.getElementById('clearInputBtn');
      const pasteInputBtn = document.getElementById('pasteInputBtn');
      const copyOutputBtn = document.getElementById('copyOutputBtn');
      const swapBtn = document.getElementById('swapBtn');

      // ---------- 工具函数 ----------
      function hideErrors() {
        inputError.style.display = 'none';
        outputError.style.display = 'none';
        inputError.textContent = '';
        outputError.textContent = '';
      }

      function showInputError(msg) {
        inputError.textContent = '❌ ' + msg;
        inputError.style.display = 'block';
      }

      function showOutputError(msg) {
        outputError.textContent = '❌ ' + msg;
        outputError.style.display = 'block';
      }

      function updateCharCount() {
        const text = inputTextarea.value;
        charCountSpan.textContent = `字符数：${text.length}`;
      }

      // Base64 编码（支持中文等 Unicode 字符）
      function encodeBase64(text) {
        try {
          // 使用 TextEncoder 处理 Unicode，然后转为 Base64
          const encoder = new TextEncoder();
          const bytes = encoder.encode(text);
          let binary = '';
          bytes.forEach(byte => {
            binary += String.fromCharCode(byte);
          });
          return btoa(binary);
        } catch (e) {
          throw new Error('编码失败：' + e.message);
        }
      }

      // Base64 解码
      function decodeBase64(base64Str) {
        try {
          // 清理输入（去除空格、换行等）
          const cleaned = base64Str.replace(/\s/g, '');
          if (!cleaned) {
            throw new Error('请输入有效的 Base64 字符串');
          }
          
          // 验证 Base64 格式
          const base64Regex = /^[A-Za-z0-9+/]*={0,2}$/;
          if (!base64Regex.test(cleaned)) {
            throw new Error('输入不是有效的 Base64 格式');
          }
          
          const binary = atob(cleaned);
          const bytes = new Uint8Array(binary.length);
          for (let i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
          }
          const decoder = new TextDecoder('utf-8');
          return decoder.decode(bytes);
        } catch (e) {
          if (e.message.includes('有效的 Base64')) {
            throw e;
          }
          throw new Error('解码失败，请检查 Base64 字符串是否正确');
        }
      }

      // 执行编码
      function performEncode() {
        hideErrors();
        const text = inputTextarea.value;
        
        if (!text) {
          showInputError('请输入要编码的文本');
          return;
        }
        
        try {
          const encoded = encodeBase64(text);
          outputTextarea.value = encoded;
          outputError.style.display = 'none';
        } catch (e) {
          showInputError(e.message);
        }
      }

      // 执行解码
      function performDecode() {
        hideErrors();
        const base64Str = outputTextarea.value || inputTextarea.value;
        
        // 优先使用输出框的内容，如果输出框为空则使用输入框
        const sourceText = outputTextarea.value.trim() || inputTextarea.value.trim();
        
        if (!sourceText) {
          showOutputError('请输入要解码的 Base64 字符串');
          return;
        }
        
        try {
          const decoded = decodeBase64(sourceText);
          inputTextarea.value = decoded;
          outputTextarea.value = sourceText; // 保持 Base64 在输出框
          updateCharCount();
          outputError.style.display = 'none';
        } catch (e) {
          showOutputError(e.message);
        }
      }

      // 清空所有
      function clearAll() {
        inputTextarea.value = '';
        outputTextarea.value = '';
        hideErrors();
        updateCharCount();
      }

      // 交换内容
      function swapContent() {
        const temp = inputTextarea.value;
        inputTextarea.value = outputTextarea.value;
        outputTextarea.value = temp;
        hideErrors();
        updateCharCount();
      }

      // 复制到剪贴板
      async function copyToClipboard(text) {
        if (!text) {
          alert('没有可复制的内容');
          return;
        }
        try {
          await navigator.clipboard.writeText(text);
          alert('✅ 已复制到剪贴板');
        } catch (err) {
          alert('❌ 复制失败，请手动复制');
        }
      }

      // ---------- 事件绑定 ----------
      encodeBtn.addEventListener('click', performEncode);
      
      decodeBtn.addEventListener('click', performDecode);
      
      clearAllBtn.addEventListener('click', clearAll);
      
      clearInputBtn.addEventListener('click', () => {
        inputTextarea.value = '';
        hideErrors();
        updateCharCount();
      });
      
      pasteInputBtn.addEventListener('click', async () => {
        try {
          const text = await navigator.clipboard.readText();
          if (text) {
            inputTextarea.value = text;
            updateCharCount();
            hideErrors();
          }
        } catch (err) {
          alert('无法读取剪贴板，请手动粘贴 (Ctrl+V)');
        }
      });
      
      copyOutputBtn.addEventListener('click', () => {
        const text = outputTextarea.value;
        copyToClipboard(text);
      });
      
      swapBtn.addEventListener('click', swapContent);

      // 输入框实时更新字符数
      inputTextarea.addEventListener('input', () => {
        updateCharCount();
        hideErrors();
      });

      outputTextarea.addEventListener('input', () => {
        hideErrors();
      });

      // 快捷键：Ctrl+Enter 编码，Ctrl+Shift+Enter 解码
      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          e.preventDefault();
          if (e.shiftKey) {
            performDecode();
          } else {
            performEncode();
          }
        }
      });

      // 初始化
      hideErrors();
      updateCharCount();
      console.log('Base64 编解码工具已启动，Ctrl+Enter 编码，Ctrl+Shift+Enter 解码');
    })();
  </script>
</body>
</html>
