<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
  <title>思绪工具箱 · AI 生成小工具集合</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f8fafc;
      font-family: 'Segoe UI', system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem 1.5rem;
      background: radial-gradient(circle at 10% 20%, rgba(226, 232, 240, 0.4) 0%, transparent 35%),
                  linear-gradient(180deg, #ffffff 0%, #f1f5f9 100%);
    }

    .container {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    /* 头部区域 */
    .header {
      text-align: center;
      margin-bottom: 3.5rem;
    }

    .logo-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .logo-icon {
      font-size: 2.8rem;
      filter: drop-shadow(0 8px 12px rgba(59, 130, 246, 0.2));
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #0f172a 0%, #334155 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 1.2rem;
      color: #475569;
      margin-top: 0.4rem;
      font-weight: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .badge {
      background: #e2e8f0;
      color: #1e293b;
      padding: 0.25rem 1rem;
      border-radius: 2rem;
      font-size: 0.85rem;
      font-weight: 500;
      background: #dbeafe;
      color: #1e40af;
    }

    .ai-tag {
      background: linear-gradient(120deg, #ede9fe, #f3e8ff);
      color: #6b21a8;
      padding: 0.2rem 1rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    /* 工具卡片网格 */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.8rem;
      margin-top: 1rem;
    }

    .tool-card {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: #ffffff;
      border-radius: 2rem;
      padding: 1.8rem 1.6rem;
      box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.06), 0 6px 12px rgba(0, 0, 0, 0.02);
      transition: all 0.25s ease;
      border: 1px solid rgba(203, 213, 225, 0.4);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .tool-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 28px 40px -14px rgba(15, 23, 42, 0.12), 0 8px 18px rgba(59, 130, 246, 0.08);
      border-color: #cbd5e1;
    }

    .tool-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .tool-card:hover::before {
      opacity: 1;
    }

    .tool-icon {
      font-size: 2.5rem;
      margin-bottom: 1.2rem;
      background: #f1f5f9;
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 1.2rem;
      background: linear-gradient(135deg, #eff6ff, #f0f9ff);
      color: #2563eb;
      box-shadow: 0 8px 14px rgba(37, 99, 235, 0.1);
    }

    .tool-title {
      font-size: 1.5rem;
      font-weight: 650;
      color: #0f172a;
      margin-bottom: 0.5rem;
      letter-spacing: -0.2px;
    }

    .tool-desc {
      color: #475569;
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 1.5rem;
      flex: 1;
    }

    .tool-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: #64748b;
    }

    .tool-tag {
      background: #f1f5f9;
      padding: 0.25rem 0.9rem;
      border-radius: 1.5rem;
      font-weight: 500;
      color: #334155;
    }

    .open-btn {
      background: #0f172a;
      border: none;
      color: white;
      padding: 0.7rem 1.5rem;
      border-radius: 2.5rem;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      margin-top: 1.2rem;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border: 1px solid #334155;
      letter-spacing: 0.3px;
    }

    .open-btn:hover {
      background: #1e293b;
      border-color: #475569;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.25);
    }

    .footer-note {
      margin-top: 3.5rem;
      text-align: center;
      color: #64748b;
      font-size: 0.9rem;
      border-top: 1px solid #e2e8f0;
      padding-top: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .count-indicator {
      background: #e9eef3;
      border-radius: 2rem;
      padding: 0.2rem 1rem;
      font-weight: 500;
      color: #1e293b;
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 2.2rem;
      }
      .tools-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <div class="header">
      <div class="logo-area">
        <span class="logo-icon">🧠</span>
        <h1>思绪工具箱</h1>
      </div>
      <div class="subtitle">
        <span class="ai-tag">✨ AI 生成</span>
        <span>实用小工具集合 · 持续收录</span>
        <span class="badge">轻量 · 即开即用</span>
      </div>
    </div>

    <!-- 工具卡片列表 -->
    <div class="tools-grid" id="toolsGrid">
      <!-- 动态通过JS生成，保证数据统一 -->
    </div>

    <!-- 底部信息 -->
    <div class="footer-note">
      <span>🧩 每个工具均由 AI 辅助生成</span>
      <span class="count-indicator" id="toolCount">1 个工具</span>
      <span>— 来自 思绪思维导图 团队</span>
    </div>
  </div>

  <script>
    (function() {
      // 工具库数据定义 —— 未来新增工具只需在此数组中添加对象即可
      const tools = [
        {
          id: 'image-resizer',
          name: '图片尺寸调整',
          icon: '🖼️',
          description: '拖拽或上传图片，自定义宽高，锁定比例，一键下载调整后的图片。支持 JPG、PNG、WebP 等格式。',
          tags: ['图像', '尺寸', '转换'],
          // 工具页面路径（相对路径，假设图片调整工具页面为 image-resizer.html）
          pageUrl: 'image-resizer.html',
          // 备用：如果希望内联打开或新窗口，可配置
          target: '_self'
        },
        {
          id: 'text-diff',
          name: '文本差异对比',
          icon: '📋',
          description: '输入两段文本，高亮显示差异部分，便于快速对比内容变化。',
          tags: ['文本', '对比', '差异'],
          pageUrl: 'text-diff.html',
          target: '_self'
        },
        {
          id: 'json-formatter',
          name: 'JSON格式化',
          icon: '📦',
          description: '支持JSON格式化、压缩、验证以及错误定位功能。',
          tags: ['格式化', '压缩', '验证'],
          pageUrl: 'json-formatter.html',
          target: '_self'
        },
        {
          id: 'base64',
          name: 'Base64编码转换',
          icon: '🔐',
          description: '支持文本与Base64之间的双向转换。',
          tags: ['Base64', '编码', '转换'],
          pageUrl: 'base64.html',
          target: '_self'
        },
        {
          id: 'calculator',
          name: '计算器',
          icon: '🧮',
          description: '模拟了真实计算器的外观和交互，支持基本运算、百分比、正负号切换等功能。',
          tags: ['计算器'],
          pageUrl: 'calculator.html',
          target: '_self'
        },
        {
          id: 'clock',
          name: '时钟',
          icon: '⏰',
          description: '采用深色背景，适合作为屏幕保护程序使用。',
          tags: ['时钟', '屏保'],
          pageUrl: 'clock.html',
          target: '_self'
        }
        // 未来可以继续添加：
        // {
        //   id: 'color-palette',
        //   name: '调色板生成器',
        //   icon: '🎨',
        //   description: '基于AI推荐生成和谐配色，导出HEX/RGB。',
        //   tags: ['设计', '颜色'],
        //   pageUrl: 'color-palette.html',
        //   target: '_self'
        // }
      ];

      const toolsGrid = document.getElementById('toolsGrid');
      const toolCountSpan = document.getElementById('toolCount');

      // 渲染工具卡片
      function renderTools() {
        if (!toolsGrid) return;
        
        // 清空现有内容
        toolsGrid.innerHTML = '';

        if (tools.length === 0) {
          toolsGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem; color:#64748b;">✨ 工具正在赶来中……</div>`;
          toolCountSpan.textContent = '0 个工具';
          return;
        }

        // 循环创建卡片
        tools.forEach(tool => {
          const card = document.createElement('div');
          card.className = 'tool-card';
          
          // 标签HTML
          const tagsHtml = tool.tags && tool.tags.length 
            ? tool.tags.map(tag => `<span class="tool-tag">${escapeHtml(tag)}</span>`).join(' ') 
            : '';
          
          card.innerHTML = `
            <div class="tool-icon">${escapeHtml(tool.icon || '🔧')}</div>
            <div class="tool-title">${escapeHtml(tool.name)}</div>
            <div class="tool-desc">${escapeHtml(tool.description)}</div>
            <div class="tool-meta">
              <div>${tagsHtml}</div>
            </div>
            <button class="open-btn" data-url="${escapeHtml(tool.pageUrl || '#')}" data-target="${escapeHtml(tool.target || '_self')}">
              <span>打开工具</span>
              <span>→</span>
            </button>
          `;
          
          toolsGrid.appendChild(card);
        });

        // 更新工具计数
        toolCountSpan.textContent = `${tools.length} 个工具`;
        
        // 绑定打开按钮事件
        document.querySelectorAll('.open-btn').forEach(btn => {
          btn.addEventListener('click', function(e) {
            const url = this.getAttribute('data-url');
            const target = this.getAttribute('data-target') || '_self';
            
            if (!url || url === '#') {
              alert('工具页面尚未配置链接。');
              return;
            }
            
            // 尝试打开对应页面
            if (target === '_blank') {
              window.open(url, '_blank');
            } else {
              window.location.href = url;
            }
          });
        });
      }

      // 简单的转义函数，防止XSS
      function escapeHtml(text) {
        if (!text) return '';
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      // 页面加载完成后渲染
      window.addEventListener('DOMContentLoaded', () => {
        renderTools();
        
        // 可选：如果希望图片调整工具页面就在同目录下，可以预先检查（但不强制）
        console.log('思绪工具箱已启动，当前收录工具：', tools.length);
      });

      // 暴露工具数据以便将来动态添加（非必须）
      window.ThoughtTools = {
        tools,
        addTool: function(tool) {
          if (!tool || !tool.name) return;
          tools.push(tool);
          renderTools();
        }
      };
    })();
  </script>
</body>
</html>
